# Docker Compose para Coolify - Sem Nginx
# Configuração otimizada para deploy no Coolify
# Data: 29/08/2025

version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: crypto-redis
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - crypto-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  # Remover todos os labels Traefik complexos e usar configuração mais simples
  backend:
    build: ./back
    container_name: crypto-backend
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY:-gZ4vNpWq8sB2kF6a10prasempre}
       - JWT_SECRET=${JWT_SECRET:-X9eR3cM7zL10prasempre1kP5f}
       - BINANCE_API_KEY=${BINANCE_API_KEY:-aUApdM0jyXeyI1HPxHymi9hSD6QZ3TXFORTknlyc1jADrkCJ7SNSayoZ6oiPCYEj}
       - BINANCE_SECRET_KEY=${BINANCE_SECRET_KEY:-YGt2MXqsIhgjk6EsCwRCUjB3LpZ0L8xGAt9w4JYK6wyX2LveLHBFvRjoyBfIVcZM}
       - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-7690455274:AAHB64l8csWoE5UpV1Pnn9c8chJzd5sZTXQ}
       - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-1249100206}
       - SENDPULSE_CLIENT_ID=${SENDPULSE_CLIENT_ID:-7b28b045d31c3d6d51591d7f56a26c99}
       - SENDPULSE_CLIENT_SECRET=${SENDPULSE_CLIENT_SECRET:-26393054ce0cd24fc16a73382a3d5eef}
       - SENDPULSE_SENDER_EMAIL=${SENDPULSE_SENDER_EMAIL:-crypten@portaldigital10.com}
       - SENDPULSE_API_URL=${SENDPULSE_API_URL:-https://api.sendpulse.com}
       - SUPABASE_URL=${SUPABASE_URL:-https://fvwdcsqucajnqupsprmo.supabase.co}
       - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY:-eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ2d2Rjc3F1Y2FqbnF1cHNwcm1vIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTMyMTAzNzUsImV4cCI6MjA2ODc4NjM3NX0.h7cNPa_WtSn7s1DDPAdBhLqUZYQLJbn3wDoAIMEFYyQ}
       - SUPABASE_DATABASE_URL=${SUPABASE_DATABASE_URL:-postgresql://postgres:Fh@xj_wgU-D2Vde@db.fvwdcsqucajnqupsprmo.supabase.co:5432/postgres}
       - MERCADO_PAGO_ACCESS_TOKEN=${MERCADO_PAGO_ACCESS_TOKEN:-TEST-6555567678065222-081500-d19fea4c0e7513745e4aba7f14244ba4-150384131}
       - MERCADO_PAGO_PUBLIC_KEY=${MERCADO_PAGO_PUBLIC_KEY:-TEST-49cb27ee-fe8c-4aa0-b055-092bf4616484}
       - CORS_ORIGINS=https://1crypten.space,https://www.1crypten.space
       - API_BASE_URL=https://api.1crypten.space
       - FRONTEND_URL=https://1crypten.space
       - BACKEND_URL=https://api.1crypten.space
      # Configurações de performance
      - GUNICORN_WORKERS=4
      - GUNICORN_THREADS=2
      - GUNICORN_TIMEOUT=120
      - GUNICORN_KEEPALIVE=5
    volumes:
      - ./back/data:/app/data
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - crypto-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api.rule=Host(`api.1crypten.space`)"
      - "traefik.http.routers.api.entrypoints=websecure"
      - "traefik.http.routers.api.tls.certresolver=letsencrypt"
      - "traefik.http.services.api.loadbalancer.server.port=5000"
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '2.0'
        reservations:
          memory: 512M
          cpus: '0.5'
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Remover labels Traefik - deixar Coolify gerenciar
  
  frontend:
    build: ./front
    container_name: crypto-frontend
    ports:
      - "3000:80"
    environment:
      - REACT_APP_API_URL=https://api.1crypten.space
      - REACT_APP_DOMAIN=https://1crypten.space
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - crypto-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=Host(`1crypten.space`)"
      - "traefik.http.routers.frontend.entrypoints=websecure"
      - "traefik.http.routers.frontend.tls.certresolver=letsencrypt"
      - "traefik.http.services.frontend.loadbalancer.server.port=80"
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
        reservations:
          memory: 256M
          cpus: '0.25'
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  redis_data:

networks:
  crypto-network:
    driver: bridge