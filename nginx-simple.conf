server {
    listen 80;
    server_name 1crypten.space;
    
    # Frontend
    location / {
        proxy_pass http://frontend:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    
    # API
    location /api/ {
        proxy_pass http://backend:5000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Content-Type application/json;
    }
}

server {
    listen 80;
    server_name 1crypten.space api.1crypten.space;
    
    # Logs para debug
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;
    
    # Headers de segurança
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    
    # Configuração para api.1crypten.space
    if ($host = api.1crypten.space) {
        rewrite ^(.*)$ /api$1 last;
    }
    
    # API Routes - PRIORIDADE MÁXIMA
    location /api/ {
        proxy_pass http://backend:5000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Headers específicos para JSON
        proxy_set_header Accept application/json;
        proxy_set_header Content-Type application/json;
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # Sem cache para APIs
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }
    
    # Frontend Routes
    location / {
        proxy_pass http://frontend:80/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # SPA fallback
        try_files $uri $uri/ /index.html;
    }
    
    # Manifest.json específico
    location = /manifest.json {
        proxy_pass http://frontend:80/manifest.json;
        proxy_set_header Host $host;
        add_header Content-Type application/manifest+json;
        add_header Cache-Control "public, max-age=3600";
    }
    
    # Service Worker
    location = /sw.js {
        proxy_pass http://frontend:80/sw.js;
        proxy_set_header Host $host;
        add_header Content-Type application/javascript;
        add_header Cache-Control "no-cache";
    }
    
    # Assets estáticos
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        proxy_pass http://frontend:80;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=31536000";
    }
}