
# Configuraēćo Nginx Otimizada para Corrigir 504 Gateway Timeout
# Data: 29/08/2025

http {
    # Timeouts globais otimizados
    client_body_timeout 120s;
    client_header_timeout 120s;
    send_timeout 120s;
    keepalive_timeout 75s;
    
    # Buffer sizes otimizados
    client_body_buffer_size 256k;
    client_header_buffer_size 4m;
    large_client_header_buffers 8 256k;
    client_max_body_size 100m;
    
    # Proxy timeouts aumentados
    proxy_connect_timeout 180s;
    proxy_send_timeout 180s;
    proxy_read_timeout 180s;
    proxy_buffering on;
    proxy_buffer_size 256k;
    proxy_buffers 8 256k;
    proxy_busy_buffers_size 512k;
    
    # Upstream com failover robusto
    upstream backend {
        server backend:5000 max_fails=5 fail_timeout=60s weight=1;
        # Adicionar mais servidores se disponķvel
        # server backend2:5000 max_fails=5 fail_timeout=60s weight=1 backup;
        
        keepalive 64;
        keepalive_requests 1000;
        keepalive_timeout 120s;
    }
    
    server {
        listen 443 ssl http2;
        server_name 1crypten.space www.1crypten.space;
        
        # API routes com timeouts estendidos
        location /api/ {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Timeouts especķficos para APIs
            proxy_connect_timeout 180s;
            proxy_send_timeout 180s;
            proxy_read_timeout 300s;  # 5 minutos para operaēões longas
            
            # Keep-alive otimizado
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            
            # Retry automįtico
            proxy_next_upstream error timeout invalid_header http_500 http_502 http_503 http_504;
            proxy_next_upstream_tries 3;
            proxy_next_upstream_timeout 60s;
        }
        
        # Health check com timeout menor
        location /health {
            proxy_pass http://backend/api/health;
            proxy_connect_timeout 30s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
            access_log off;
        }
        
        # Frontend com cache otimizado
        location / {
            root /var/www/html;
            try_files $uri $uri/ /index.html;
            
            # Cache para arquivos estįticos
            location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
                expires 1y;
                add_header Cache-Control "public, immutable";
                add_header X-Cache-Status "HIT";
            }
            
            # Manifest.json especķfico
            location = /manifest.json {
                try_files $uri =404;
                add_header Cache-Control "no-cache";
            }
        }
    }
}
