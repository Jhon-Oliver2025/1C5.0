# Docker Compose para Coolify - Sem Nginx
# Configuração otimizada para deploy no Coolify
# Data: 29/08/2025

version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: crypto-redis
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - crypto-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  backend:
    build: ./back
    container_name: crypto-backend
    ports:
      - "5000:5000"  # Expor para Coolify
    environment:
      - FLASK_ENV=production
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY:-gZ4vNpWq8sB2kF6a10prasempre}
      - JWT_SECRET=${JWT_SECRET:-X9eR3cM7zL10prasempre1kP5f}
      - BINANCE_API_KEY=${BINANCE_API_KEY:-demo_key}
      - BINANCE_SECRET_KEY=${BINANCE_SECRET_KEY:-demo_secret}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-demo_token}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-demo_chat_id}
      - SENDPULSE_CLIENT_ID=${SENDPULSE_CLIENT_ID:-demo_client_id}
      - SENDPULSE_CLIENT_SECRET=${SENDPULSE_CLIENT_SECRET:-demo_client_secret}
      - SENDPULSE_SENDER_EMAIL=${SENDPULSE_SENDER_EMAIL:-demo@example.com}
      - SENDPULSE_API_URL=${SENDPULSE_API_URL:-https://api.sendpulse.com}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - CORS_ORIGINS=https://1crypten.space,https://www.1crypten.space
      - API_BASE_URL=https://api.1crypten.space
      # Configurações de performance
      - GUNICORN_WORKERS=4
      - GUNICORN_THREADS=2
      - GUNICORN_TIMEOUT=120
      - GUNICORN_KEEPALIVE=5
    volumes:
      - ./back/data:/app/data
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - crypto-network
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '2.0'
        reservations:
          memory: 512M
          cpus: '0.5'
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/api/health')"]
      interval: 45s
      timeout: 15s
      retries: 8
      start_period: 120s

  frontend:
    build: ./front
    container_name: crypto-frontend
    ports:
      - "3000:80"  # Expor para Coolify
    environment:
      - REACT_APP_API_URL=https://1crypten.space
      - REACT_APP_DOMAIN=https://1crypten.space
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - crypto-network
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
        reservations:
          memory: 256M
          cpus: '0.25'
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80"]
      interval: 45s
      timeout: 15s
      retries: 6
      start_period: 90s

volumes:
  redis_data:

networks:
  crypto-network:
    driver: bridge